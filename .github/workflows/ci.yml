name: CI

on:
  push:
    branches: ["main", "develop", "feature/**", "fix/**"]
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Установка Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Проверка lint
        run: make lint
      - name: Проверка тестов
        run: make test
