services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: zemledar
      POSTGRES_USER: zemledar
      POSTGRES_PASSWORD: zemledar
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zemledar -d zemledar"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_NAME: zemledar-api
      APP_ENV: dev
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql://zemledar:zemledar@db:5432/zemledar
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/src
    ports:
      - "18000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgis_data:
  redis_data:
